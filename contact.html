<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Graciela Cheines</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 600px; margin: auto; }
        form { display: flex; flex-direction: column; }
        label { margin-top: 10px; font-weight: bold; }
        input, textarea { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Contáctanos</h1>
    <p>Envíanos un mensaje y te responderemos pronto.</p>

    <!-- El "action" usa Formspree para redirigir los datos a tu correo -->
    <form action="https://formspree.io" method="POST">
        
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="name" placeholder="Tu nombre" required>

        <label for="email">Tu correo electrónico:</label>
        <input type="email" id="email" name="_replyto" placeholder="ejemplo@correo.com" required>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit">Enviar mensaje</button>
        
    </form>

</body>
</html>
